<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Monkey Mog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F3;--clay:#C4784A;--clay-dark:#9E5A30;--clay-light:#F0DDD0;--charcoal:#2C2C2A;--muted:#7A7870;--border:#E4E0D8;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);}
a{text-decoration:none;color:inherit;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.5rem;}
.nav-logo span{color:var(--clay);}
.nav-links{display:flex;gap:2rem;font-size:0.9rem;font-weight:500;color:var(--muted);}
.nav-links a:hover{color:var(--clay);}
.cart-btn{background:var(--clay);color:white;padding:0.5rem 1.3rem;border-radius:999px;font-size:0.85rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.cart-btn:hover{background:var(--clay-dark);}
.breadcrumb{padding:1.5rem 3rem;font-size:0.85rem;color:var(--muted);}
.breadcrumb a{color:var(--clay);}
.product-detail{display:grid;grid-template-columns:1fr 1fr;gap:5rem;padding:2rem 3rem 6rem;align-items:start;}
.product-visual{background:var(--clay-light);border-radius:24px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10rem;}
.product-cat{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--clay);margin-bottom:0.6rem;font-weight:500;}
.product-name{font-family:'Playfair Display',serif;font-size:2.8rem;line-height:1.15;margin-bottom:1rem;}
.product-price{font-size:1.8rem;font-weight:500;color:var(--clay);margin-bottom:0.5rem;}
.stock-indicator{font-size:0.85rem;margin-bottom:1.5rem;font-weight:500;}
.stock-ok{color:#2e7d52;}
.stock-low{color:#C4784A;}
.stock-out{color:#c0392b;}
.product-desc{color:var(--muted);font-size:1rem;line-height:1.8;margin-bottom:2rem;}
.product-details{border-top:1px solid var(--border);padding-top:1.5rem;margin-bottom:2rem;}
.product-details h4{font-size:0.85rem;font-weight:500;margin-bottom:0.8rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
.detail-item{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.9rem;}
.detail-item span:last-child{color:var(--muted);}
.qty-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.qty-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{border-color:var(--clay);color:var(--clay);}
.qty-display{font-size:1.1rem;font-weight:500;min-width:2rem;text-align:center;}
.btn-primary{background:var(--clay);color:white;padding:1rem 2.5rem;border-radius:999px;font-weight:500;font-size:1rem;transition:background 0.2s;display:inline-block;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;text-align:center;}
.btn-primary:hover{background:var(--clay-dark);}
.btn-disabled{background:var(--muted);color:white;padding:1rem 2.5rem;border-radius:999px;font-weight:500;font-size:1rem;width:100%;text-align:center;cursor:not-allowed;border:none;font-family:'DM Sans',sans-serif;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--charcoal);color:white;padding:0.8rem 1.5rem;border-radius:999px;font-size:0.9rem;opacity:0;transform:translateY(20px);transition:all 0.3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.not-found{text-align:center;padding:8rem 2rem;color:var(--muted);}
.not-found h2{font-family:'Playfair Display',serif;margin-bottom:1rem;}
@media(max-width:768px){nav{padding:1rem 1.5rem;}.nav-links{display:none;}.product-detail{grid-template-columns:1fr;gap:2rem;padding:1.5rem;}.breadcrumb{padding:1rem 1.5rem;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Monkey <span>Mog</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="index.html#about">About</a>
    <a href="index.html#reviews">Reviews</a>
  </div>
  <button class="cart-btn" onclick="window.location='cart.html'">Cart (<span id="cart-count">0</span>)</button>
</nav>
<div class="breadcrumb"><a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <span id="breadcrumb-name">Product</span></div>

<div id="product-content"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
updateCartCount();
let qty = 1;

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const products = getProducts();
const p = products.find(x => x.id === id);

if (!p) {
  document.getElementById('product-content').innerHTML = `
    <div class="not-found"><h2>Product not found</h2><p>This piece may have sold or been removed.</p><br><a href="shop.html" style="color:var(--clay);">Browse all pieces →</a></div>`;
} else {
  document.getElementById('breadcrumb-name').textContent = p.name;
  document.title = `${p.name} — Monkey Mog`;

  const oos = p.stock <= 0;
  const low = p.stock > 0 && p.stock <= 3;
  const stockHTML = oos
    ? '<div class="stock-indicator stock-out">✕ Out of stock</div>'
    : low
      ? `<div class="stock-indicator stock-low">⚠ Only ${p.stock} left!</div>`
      : `<div class="stock-indicator stock-ok">✓ In stock (${p.stock} available)</div>`;

  document.getElementById('product-content').innerHTML = `
    <div class="product-detail">
      <div class="product-visual" style="overflow:hidden;">${productThumb(p, '100%')}</div>
      <div class="product-info">
        <div class="product-cat">${p.category}</div>
        <h1 class="product-name">${p.name}</h1>
        <div class="product-price">$${Number(p.price).toFixed(2)}</div>
        ${stockHTML}
        <p class="product-desc">${p.desc} Each piece is hand-thrown and unique — glaze patterns and dimensions may vary slightly.</p>
        <div class="product-details">
          <h4>Details</h4>
          <div class="detail-item"><span>Category</span><span>${p.category}</span></div>
          <div class="detail-item"><span>Made</span><span>Handmade in our studio</span></div>
          <div class="detail-item"><span>Finish</span><span>Food safe glaze</span></div>
          <div class="detail-item"><span>Care</span><span>Dishwasher safe</span></div>
        </div>
        ${oos ? '' : `
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-display" id="qty-display">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
          <span style="color:var(--muted);font-size:0.9rem;">quantity</span>
        </div>`}
        ${oos
          ? '<button class="btn-disabled" disabled>Out of Stock</button>'
          : '<button class="btn-primary" onclick="handleAddToCart()">Add to Cart</button>'
        }
      </div>
    </div>`;
}

function changeQty(delta) {
  const maxStock = p ? p.stock : 1;
  qty = Math.min(maxStock, Math.max(1, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}
function handleAddToCart() {
  for (let i = 0; i < qty; i++) addToCart({ id: p.id, name: p.name, price: p.price, emoji: p.emoji });
  showToast(`${qty}× "${p.name}" added to cart!`);
}
</script>
</body>
</html>
