<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Monkey Mog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F3;--clay:#C4784A;--clay-dark:#9E5A30;--clay-light:#F0DDD0;--charcoal:#2C2C2A;--muted:#7A7870;--border:#E4E0D8;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);}
a{text-decoration:none;color:inherit;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.5rem;}
.nav-logo span{color:var(--clay);}
.nav-links{display:flex;gap:2rem;font-size:0.9rem;font-weight:500;color:var(--muted);}
.nav-links a:hover{color:var(--clay);}
.cart-btn{background:var(--clay);color:white;padding:0.5rem 1.3rem;border-radius:999px;font-size:0.85rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}

.page{display:grid;grid-template-columns:1fr 380px;gap:3rem;padding:3rem;max-width:1100px;margin:0 auto;}
h1{font-family:'Playfair Display',serif;font-size:2.2rem;margin-bottom:2rem;}

.cart-item{display:flex;align-items:center;gap:1.5rem;padding:1.5rem 0;border-bottom:1px solid var(--border);}
.item-emoji{width:80px;height:80px;background:var(--clay-light);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;}
.item-details{flex:1;}
.item-name{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:0.3rem;}
.item-price{color:var(--clay);font-weight:500;}
.qty-controls{display:flex;align-items:center;gap:0.6rem;margin-top:0.6rem;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--white);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{border-color:var(--clay);color:var(--clay);}
.qty-num{font-size:0.95rem;font-weight:500;min-width:1.5rem;text-align:center;}
.remove-btn{color:var(--muted);font-size:0.8rem;cursor:pointer;margin-left:0.5rem;background:none;border:none;font-family:'DM Sans',sans-serif;}
.remove-btn:hover{color:#c0392b;}
.item-subtotal{font-weight:500;font-size:1rem;min-width:70px;text-align:right;}

.empty-cart{text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty-cart h2{font-family:'Playfair Display',serif;margin-bottom:1rem;}
.empty-cart a{color:var(--clay);}

/* Summary */
.order-summary{background:var(--white);border-radius:20px;padding:2rem;border:1px solid var(--border);position:sticky;top:100px;height:fit-content;}
.order-summary h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:1.5rem;}
.summary-row{display:flex;justify-content:space-between;font-size:0.95rem;padding:0.5rem 0;}
.summary-row.total{border-top:1px solid var(--border);margin-top:0.5rem;padding-top:1rem;font-weight:500;font-size:1.1rem;}
.checkout-btn{width:100%;background:var(--clay);color:white;padding:1rem;border-radius:999px;font-size:1rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-top:1.5rem;}
.checkout-btn:hover{background:var(--clay-dark);}
.continue-link{display:block;text-align:center;margin-top:1rem;color:var(--muted);font-size:0.85rem;}
.continue-link a{color:var(--clay);}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--charcoal);color:white;padding:0.8rem 1.5rem;border-radius:999px;font-size:0.9rem;opacity:0;transform:translateY(20px);transition:all 0.3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:768px){nav{padding:1rem 1.5rem;}.nav-links{display:none;}.page{grid-template-columns:1fr;padding:1.5rem;}.order-summary{position:static;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Monkey <span>Mog</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </div>
  <button class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
</nav>

<div class="page">
  <div>
    <h1>Your Cart</h1>
    <div id="cart-items"></div>
  </div>
  <div class="order-summary">
    <h2>Order Summary</h2>
    <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
    <div class="summary-row"><span>Shipping</span><span>Calculated at checkout</span></div>
    <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>
    <button class="checkout-btn" onclick="window.location='checkout.html'">Proceed to Checkout</button>
    <div class="continue-link"><a href="shop.html">← Continue Shopping</a></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
updateCartCount();
renderCart();

function renderCart() {
  const cart = getCart();
  const container = document.getElementById('cart-items');
  if (!cart.length) {
    container.innerHTML = `<div class="empty-cart"><h2>Your cart is empty</h2><p>Looks like you haven't added anything yet.</p><br><a href="shop.html">Browse the collection →</a></div>`;
    document.getElementById('subtotal').textContent = '$0.00';
    document.getElementById('total').textContent = '$0.00';
    return;
  }
  container.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-details">
        <div class="item-name">${item.name}</div>
        <div class="item-price">$${Number(item.price).toFixed(2)} each</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="updateQty(${idx}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
          <button class="remove-btn" onclick="removeItem(${idx})">Remove</button>
        </div>
      </div>
      <div class="item-subtotal">$${(item.price * item.qty).toFixed(2)}</div>
    </div>
  `).join('');
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
  document.getElementById('total').textContent = `$${subtotal.toFixed(2)}`;
}

function updateQty(idx, delta) {
  const cart = getCart();
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  saveCart(cart);
  renderCart();
}
function removeItem(idx) {
  const cart = getCart();
  cart.splice(idx, 1);
  saveCart(cart);
  renderCart();
  showToast('Item removed from cart.');
}
</script>
</body>
</html>
